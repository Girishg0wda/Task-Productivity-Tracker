{% extends 'base.html' %}

{% block content %}
<div class="glass-card p-4 p-md-5 mb-4" style="max-width: 420px; margin: 0 auto;">
  <h2 class="fw-bold mb-3 text-center">
    <i class="bi bi-person-circle me-2"></i> Login
  </h2>

  <form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}

    <div class="mb-3">
      <label class="form-label tiny-label">Username</label>
      {{ form.username }}
    </div>
    <div class="mb-3">
      <label class="form-label tiny-label">Password</label>
      {{ form.password }}
    </div>

    <button type="submit" class="btn btn-neon w-100 mb-2">
      <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
    </button>
  </form>

  <p class="small text-center mt-3 mb-0">
    Don’t have an account?
    <a href="{% url 'tasks:signup' %}">Sign up</a>
  </p>
</div>
{% endblock %}
